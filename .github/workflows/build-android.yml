name: Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 保留你的 v7 版本
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      # 1. 正常安装依赖
      - name: Install dependencies
        run: bun install

      # 2. 【关键调整】先执行 prebuild，动态生成 android 文件夹和 gradle 文件
      - name: Prebuild
        run: bunx expo prebuild --platform android

      # 3. 【关键调整】有了 android 目录后，再初始化 Java 6，此时内置的 gradle 缓存就不会报错了
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # 4. 给脚本权限并编译
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 5. 保留你的 v7 版本，并指向生成的 apk 路径
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
