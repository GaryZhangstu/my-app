name: Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 修正为正确的 v4 版本
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          # 兼容 bun.lockb 和新版 Bun 的 bun.lock
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      # 2. 修正为 v4 版本，并开启自带的 gradle 缓存功能（省去了后面手写缓存的麻烦）
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: bun install

      # 3. 在这里生成 android 目录
      - name: Prebuild
        run: bunx expo prebuild --platform android

      # 4. 赋予 gradlew 执行权限，并执行打包
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 5. 修正为 v4 版本，并精确指定上传的 apk 文件
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
